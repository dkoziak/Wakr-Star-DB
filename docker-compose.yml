services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - src/.env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: wakr
      POSTGRES_PASSWORD: wakr
      POSTGRES_DB: wakr
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wakr"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
